<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <desc>Caliburn Vessel Hull Outlines Collection</desc>
  <g transform="translate(0, 0)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline -->
                    <path d="M 50 100 
                             C 50 80, 80 70, 120 70
                             L 280 70
                             C 320 70, 350 80, 350 100
                             C 350 120, 320 130, 280 130
                             L 120 130
                             C 80 130, 50 120, 50 100 Z"></path>
                    
                    <!-- Antenna mast -->
                    <line x1="200" y1="70" x2="200" y2="40"></line>
                    <circle cx="200" cy="40" r="3"></circle>
                    
                    <!-- Sensor dome -->
                    <ellipse cx="150" cy="70" rx="20" ry="10"></ellipse>
                    
                    <!-- Component mounting areas -->
                    <rect x="220" y="85" width="40" height="30" stroke-dasharray="2,2"></rect>
                    <rect x="140" y="85" width="40" height="30" stroke-dasharray="2,2"></rect>
                </g>
              </g>
  <g transform="translate(400, 0)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline -->
                    <path d="M 40 100
                             C 40 85, 50 80, 70 80
                             L 90 80
                             L 100 70
                             L 300 70
                             L 310 80
                             L 330 80
                             C 350 80, 360 85, 360 100
                             C 360 115, 350 120, 330 120
                             L 310 120
                             L 300 130
                             L 100 130
                             L 90 120
                             L 70 120
                             C 50 120, 40 115, 40 100 Z"></path>
                    
                    <!-- Superstructure -->
                    <rect x="150" y="50" width="100" height="20"></rect>
                    
                    <!-- Mast -->
                    <line x1="200" y1="50" x2="200" y2="30"></line>
                    <line x1="190" y1="40" x2="210" y2="40"></line>
                    
                    <!-- Weapon mount areas -->
                    <circle cx="120" cy="70" r="15" stroke-dasharray="2,2"></circle>
                    <circle cx="280" cy="70" r="15" stroke-dasharray="2,2"></circle>
                    
                    <!-- Component areas -->
                    <rect x="160" y="85" width="30" height="35" stroke-dasharray="2,2"></rect>
                    <rect x="210" y="85" width="30" height="35" stroke-dasharray="2,2"></rect>
                </g>
              </g>
  <g transform="translate(800, 0)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline -->
                    <path d="M 30 110
                             L 40 100
                             L 50 95
                             L 80 93
                             L 320 93
                             L 350 95
                             L 360 100
                             L 370 110
                             L 360 120
                             L 350 125
                             L 320 127
                             L 80 127
                             L 50 125
                             L 40 120
                             L 30 110 Z"></path>
                    
                    <!-- Superstructure levels -->
                    <rect x="140" y="75" width="120" height="18"></rect>
                    <rect x="150" y="60" width="100" height="15"></rect>
                    <rect x="170" y="45" width="60" height="15"></rect>
                    
                    <!-- Masts and sensors -->
                    <line x1="190" y1="45" x2="190" y2="25"></line>
                    <line x1="210" y1="45" x2="210" y2="25"></line>
                    <circle cx="190" cy="25" r="4"></circle>
                    <ellipse cx="210" cy="25" rx="6" ry="3"></ellipse>
                    
                    <!-- VLS cells -->
                    <rect x="90" y="85" width="40" height="8"></rect>
                    <rect x="270" y="85" width="40" height="8"></rect>
                    
                    <!-- Component mounting areas -->
                    <rect x="100" y="100" width="25" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="140" y="100" width="25" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="235" y="100" width="25" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="275" y="100" width="25" height="20" stroke-dasharray="2,2"></rect>
                    
                    <!-- Helipad -->
                    <rect x="310" y="93" width="35" height="34" stroke-dasharray="2,2"></rect>
                    <circle cx="327.5" cy="110" r="10" stroke-dasharray="1,1"></circle>
                </g>
              </g>
  <g transform="translate(0, 400)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline -->
                    <ellipse cx="200" cy="100" rx="160" ry="25"></ellipse>
                    
                    <!-- Sail -->
                    <path d="M 180 75
                             L 180 85
                             L 190 87.5
                             L 210 87.5
                             L 220 85
                             L 220 75
                             C 220 70, 215 65, 200 65
                             C 185 70, 180 70, 180 75 Z"></path>
                    
                    <!-- Periscope/masts -->
                    <line x1="195" y1="65" x2="195" y2="50"></line>
                    <line x1="205" y1="65" x2="205" y2="55"></line>
                    
                    <!-- Component areas -->
                    <rect x="80" y="90" width="30" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="130" y="90" width="30" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="240" y="90" width="30" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="290" y="90" width="30" height="20" stroke-dasharray="2,2"></rect>
                    
                    <!-- Torpedo tubes (forward) -->
                    <circle cx="45" cy="100" r="8" stroke-dasharray="1,1"></circle>
                    <circle cx="45" cy="85" r="8" stroke-dasharray="1,1"></circle>
                    <circle cx="45" cy="115" r="8" stroke-dasharray="1,1"></circle>
                </g>
              </g>
  <g transform="translate(400, 400)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline -->
                    <ellipse cx="200" cy="100" rx="120" ry="15"></ellipse>
                    
                    <!-- Nose cone -->
                    <path d="M 80 100
                             C 80 90, 60 90, 60 100
                             C 60 110, 80 110, 80 100 Z"></path>
                    
                    <!-- Tail section -->
                    <path d="M 320 100
                             C 320 90, 340 90, 340 100
                             C 340 110, 320 110, 320 100 Z"></path>
                    
                    <!-- Fins -->
                    <path d="M 310 85 L 330 70 L 330 85 Z"></path>
                    <path d="M 310 115 L 330 130 L 330 115 Z"></path>
                    
                    <!-- Component areas -->
                    <rect x="100" y="92.5" width="40" height="15" stroke-dasharray="2,2"></rect>
                    <rect x="180" y="92.5" width="40" height="15" stroke-dasharray="2,2"></rect>
                    <rect x="260" y="92.5" width="40" height="15" stroke-dasharray="2,2"></rect>
                    
                    <!-- Sensor array -->
                    <circle cx="75" cy="100" r="8" stroke-dasharray="1,1"></circle>
                </g>
              </g>
  <g transform="translate(800, 400)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline - sharp, angular -->
                    <path d="M 40 105
                             L 60 90
                             L 100 88
                             L 280 88
                             L 340 90
                             L 370 100
                             L 360 115
                             L 340 120
                             L 280 122
                             L 100 122
                             L 60 120
                             L 40 115
                             L 40 105 Z"></path>
                    
                    <!-- Low profile superstructure -->
                    <path d="M 150 88
                             L 150 75
                             L 160 70
                             L 240 70
                             L 250 75
                             L 250 88"></path>
                    
                    <!-- Stealth mast -->
                    <path d="M 195 70 L 195 50 L 205 50 L 205 70"></path>
                    
                    <!-- Weapon stations -->
                    <rect x="110" y="78" width="30" height="10"></rect>
                    <rect x="260" y="78" width="30" height="10"></rect>
                    
                    <!-- Component areas -->
                    <rect x="120" y="95" width="35" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="170" y="95" width="60" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="245" y="95" width="35" height="20" stroke-dasharray="2,2"></rect>
                </g>
              </g>
</svg>