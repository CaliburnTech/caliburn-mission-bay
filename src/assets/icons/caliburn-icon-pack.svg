        <circle cx="12" cy="12" r="2"/>
        <path d="M 12 10 L 12 6 M 12 6 L 18 2"/>
        <path d="M 8 8 A 6 6 0 0 1 16 8" stroke-dasharray="0.5,1"/>
        <path d="M 6 6 A 9 9 0 0 1 18 6" stroke-dasharray="0.5,1"/>
        <rect x="10" y="12" width="4" height="6"/>
        <rect x="8" y="18" width="8" height="2"/>
      </g>
    </g>
    
    <g id="icon-sonar">
      <g stroke="#cbfd00" stroke-width="1.5" fill="none">
        <circle cx="12" cy="12" r="3"/>
        <path d="M 12 9 Q 16 12, 12 15 Q 8 12, 12 9"/>
        <path d="M 12 12 L 20 12" stroke-dasharray="1,0.5" opacity="0.8"/>
        <path d="M 12 12 L 20 8" stroke-dasharray="1,0.5" opacity="0.6"/>
        <path d="M 12 12 L 20 16" stroke-dasharray="1,0.5" opacity="0.6"/>
      </g>
    </g>
    
    <g id="icon-eoir-camera">
      <g stroke="#cbfd00" stroke-width="1.5" fill="none">
        <circle cx="12" cy="12" r="8"/>
        <circle cx="12" cy="12" r="5"/>
        <circle cx="12" cy="12" r="2" fill="#cbfd00"/>
        <path d="M 4 12 Q 4 4, 12 4" stroke-dasharray="1,1"/>
        <path d="M 20 12 Q 20 20, 12 20" stroke-dasharray="1,1"/>
      </g>
    </g>
    
    <g id="icon-lidar">
      <g stroke="#cbfd00" stroke-width="1.5" fill="none">
        <rect x="8" y="10" width="8" height="4"/>
        <circle cx="12" cy="12" r="1" fill="#cbfd00"/>
        <path d="M 12 12 L 20 4" opacity="0.6"/>
        <path d="M 12 12 L 20 8" opacity="0.8"/>
        <path d="M 12 12 L 20 12"/>
        <path d="M 12 12 L 20 16" opacity="0.8"/>
        <path d="M 12 12 L 20 20" opacity="0.6"/>
      </g>
    </g>
    
    <g id="icon-mad-sensor">
      <g stroke="#cbfd00" stroke-width="1.5" fill="none">
        <ellipse cx="12" cy="16" rx="6" ry="2"/>
        <path d="M 6 16 L 6 8 M 18 16 L 18 8"/>
        <path d="M 6 8 Q 12 4, 18 8" stroke-dasharray="2,1"/>
        <path d="M 8 10 Q 12 8, 16 10" stroke-dasharray="1,1"/>
        <path d="M 10 12 Q 12 11, 14 12" stroke-dasharray="1,1"/>
      </g>
    </g>
    
    <g id="icon-rf-esm">
      <g stroke="#cbfd00" stroke-width="1.5" fill="none">
        <path d="M 12 20 L 12 8"/>
        <path d="M 8 10 L 12 8 L 16 10"/>
        <path d="M 9 13 L 12 11 L 15 13"/>
        <path d="M 10 16 L 12 14 L 14 16"/>
