  <!-- Icon grid display -->
  <text x="120" y="20" text-anchor="middle" fill="#cbfd00" font-family="Arial, sans-serif" font-size="14">Caliburn Maritime Systems Icon Pack</text>
  
  <!-- Display all icons in a grid -->
  <use href="#icon-radar-array" x="0" y="30"/>
  <use href="#icon-sonar" x="30" y="30"/>
  <use href="#icon-eoir-camera" x="60" y="30"/>
  <use href="#icon-lidar" x="90" y="30"/>
  <use href="#icon-mad-sensor" x="120" y="30"/>
  <use href="#icon-rf-esm" x="150" y="30"/>
  
  <!-- Continue grid for all icons... -->
  
</svg>