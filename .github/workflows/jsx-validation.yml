name: JSX Syntax Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  jsx-validation:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run JSX Syntax Validation
      run: npm run validate:jsx

    - name: Run ESLint JSX Rules
      run: npm run lint:jsx

    - name: Attempt build to catch syntax errors
      run: npm run build

    - name: Upload build artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.node-version }}
        path: |
          dist/
          node_modules/.vite/
        retention-days: 1

  jsx-validation-results:
    runs-on: ubuntu-latest
    needs: jsx-validation
    if: always()
    
    steps:
    - name: Check JSX validation results
      run: |
        if [[ "${{ needs.jsx-validation.result }}" == "failure" ]]; then
          echo "❌ JSX validation failed! Please check the logs above for syntax errors."
          echo "Common JSX syntax errors to check:"
          echo "• Unclosed tags"
          echo "• Mismatched opening/closing tags"
          echo "• Missing closing brackets"
          echo "• Invalid JSX expressions"
          echo "• Unbalanced parentheses or braces"
          exit 1
        else
          echo "✅ All JSX validation checks passed!"
        fi