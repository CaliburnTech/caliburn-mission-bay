<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <desc>Caliburn Additional Vessel Hull Outlines Collection</desc>
  <g transform="translate(0, 0)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline - catamaran style -->
                    <!-- Left hull -->
                    <path d="M 60 90
                             C 60 85, 70 83, 80 83
                             L 140 83
                             C 150 83, 160 85, 160 90
                             L 160 110
                             C 160 115, 150 117, 140 117
                             L 80 117
                             C 70 117, 60 115, 60 110
                             L 60 90 Z"></path>
                    
                    <!-- Right hull -->
                    <path d="M 240 90
                             C 240 85, 250 83, 260 83
                             L 320 83
                             C 330 83, 340 85, 340 90
                             L 340 110
                             C 340 115, 330 117, 320 117
                             L 260 117
                             C 250 117, 240 115, 240 110
                             L 240 90 Z"></path>
                    
                    <!-- Cross deck -->
                    <rect x="160" y="85" width="80" height="30"></rect>
                    
                    <!-- Sensor mast -->
                    <line x1="200" y1="85" x2="200" y2="50"></line>
                    <circle cx="200" cy="50" r="5"></circle>
                    <line x1="190" y1="60" x2="210" y2="60"></line>
                    
                    <!-- Solar panels (on cross deck) -->
                    <rect x="170" y="88" width="25" height="12" stroke-dasharray="1,1"></rect>
                    <rect x="205" y="88" width="25" height="12" stroke-dasharray="1,1"></rect>
                    
                    <!-- Component mounting areas -->
                    <rect x="85" y="90" width="30" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="125" y="90" width="30" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="265" y="90" width="30" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="305" y="90" width="30" height="20" stroke-dasharray="2,2"></rect>
                    
                    <!-- Propulsion -->
                    <circle cx="70" cy="100" r="8" stroke-dasharray="1,1"></circle>
                    <circle cx="330" cy="100" r="8" stroke-dasharray="1,1"></circle>
                </g>
              </g>
  <g transform="translate(400, 0)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline - rigid inflatable style -->
                    <path d="M 80 100
                             C 80 85, 90 80, 100 80
                             L 120 78
                             L 280 78
                             L 300 80
                             C 310 80, 320 85, 320 100
                             C 320 115, 310 120, 300 120
                             L 280 122
                             L 120 122
                             L 100 120
                             C 90 120, 80 115, 80 100 Z"></path>
                    
                    <!-- Inflatable tubes -->
                    <ellipse cx="100" cy="100" rx="15" ry="18" stroke-dasharray="3,2"></ellipse>
                    <ellipse cx="300" cy="100" rx="15" ry="18" stroke-dasharray="3,2"></ellipse>
                    
                    <!-- Control console -->
                    <rect x="190" y="85" width="20" height="30"></rect>
                    
                    <!-- Small mast -->
                    <line x1="200" y1="85" x2="200" y2="65"></line>
                    <circle cx="200" cy="65" r="3"></circle>
                    
                    <!-- Component areas -->
                    <rect x="130" y="90" width="40" height="25" stroke-dasharray="2,2"></rect>
                    <rect x="230" y="90" width="40" height="25" stroke-dasharray="2,2"></rect>
                    
                    <!-- Outboard mount -->
                    <rect x="315" y="95" width="15" height="10"></rect>
                </g>
              </g>
  <g transform="translate(800, 0)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline - patrol boat style -->
                    <path d="M 50 105
                             L 60 95
                             L 80 92
                             L 100 90
                             L 300 90
                             L 320 92
                             L 340 95
                             L 350 105
                             L 345 115
                             L 335 120
                             L 320 122
                             L 300 124
                             L 100 124
                             L 80 122
                             L 65 120
                             L 55 115
                             L 50 105 Z"></path>
                    
                    <!-- Wheelhouse -->
                    <rect x="170" y="70" width="60" height="20"></rect>
                    <path d="M 170 70 L 180 60 L 220 60 L 230 70"></path>
                    
                    <!-- Mast array -->
                    <line x1="200" y1="60" x2="200" y2="40"></line>
                    <line x1="190" y1="50" x2="210" y2="50"></line>
                    <circle cx="200" cy="40" r="4"></circle>
                    
                    <!-- Forward weapon mount -->
                    <circle cx="100" cy="90" r="12" stroke-dasharray="2,2"></circle>
                    
                    <!-- Aft deck area -->
                    <rect x="250" y="92" width="60" height="30" stroke-dasharray="2,2"></rect>
                    
                    <!-- Component mounting areas -->
                    <rect x="120" y="95" width="35" height="25" stroke-dasharray="2,2"></rect>
                    <rect x="180" y="95" width="35" height="25" stroke-dasharray="2,2"></rect>
                    
                    <!-- Side mounted systems -->
                    <rect x="85" y="105" width="8" height="15"></rect>
                    <rect x="307" y="105" width="8" height="15"></rect>
                    
                    <!-- Engine vents -->
                    <line x1="240" y1="85" x2="245" y2="85"></line>
                    <line x1="240" y1="88" x2="245" y2="88"></line>
                </g>
              </g>
  <g transform="translate(0, 200)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline - corvette style -->
                    <path d="M 35 108
                             L 45 98
                             L 60 94
                             L 80 92
                             L 320 92
                             L 340 94
                             L 355 98
                             L 365 108
                             L 360 118
                             L 350 122
                             L 340 124
                             L 320 126
                             L 80 126
                             L 60 124
                             L 50 122
                             L 40 118
                             L 35 108 Z"></path>
                    
                    <!-- Superstructure -->
                    <rect x="160" y="72" width="80" height="20"></rect>
                    <rect x="170" y="58" width="60" height="14"></rect>
                    
                    <!-- Integrated mast -->
                    <path d="M 195 58 L 195 35 L 205 35 L 205 58"></path>
                    <rect x="190" y="35" width="20" height="8"></rect>
                    
                    <!-- Forward gun mount -->
                    <circle cx="90" cy="92" r="15"></circle>
                    <rect x="85" y="87" width="10" height="10"></rect>
                    
                    <!-- VLS cells -->
                    <rect x="120" y="85" width="30" height="7"></rect>
                    <line x1="125" y1="85" x2="125" y2="92"></line>
                    <line x1="130" y1="85" x2="130" y2="92"></line>
                    <line x1="135" y1="85" x2="135" y2="92"></line>
                    <line x1="140" y1="85" x2="140" y2="92"></line>
                    <line x1="145" y1="85" x2="145" y2="92"></line>
                    
                    <!-- Component areas -->
                    <rect x="100" y="100" width="40" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="155" y="100" width="50" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="220" y="100" width="50" height="20" stroke-dasharray="2,2"></rect>
                    
                    <!-- Rear weapon/sensor mount -->
                    <circle cx="300" cy="92" r="12" stroke-dasharray="2,2"></circle>
                    
                    <!-- Side arrays -->
                    <rect x="75" y="108" width="5" height="10"></rect>
                    <rect x="320" y="108" width="5" height="10"></rect>
                    
                    <!-- Exhaust -->
                    <rect x="250" y="75" width="8" height="15"></rect>
                </g>
              </g>
  <g transform="translate(400, 200)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Hull outline - narrow boat -->
                    <path d="M 100 130
                             C 100 125, 105 123, 110 123
                             L 290 123
                             C 295 123, 300 125, 300 130
                             C 300 135, 295 137, 290 137
                             L 110 137
                             C 105 137, 100 135, 100 130 Z"></path>
                    
                    <!-- Keel -->
                    <line x1="200" y1="137" x2="200" y2="155"></line>
                    <ellipse cx="200" cy="155" rx="15" ry="3"></ellipse>
                    
                    <!-- Wing sail (rigid sail) -->
                    <path d="M 200 123
                             L 200 30
                             C 200 25, 205 20, 210 20
                             L 215 20
                             C 220 20, 225 22, 225 25
                             L 225 110
                             C 225 115, 220 118, 215 118
                             L 210 118
                             C 205 118, 200 120, 200 123 Z"></path>
                    
                    <!-- Sail control mechanism -->
                    <circle cx="200" cy="120" r="5"></circle>
                    <line x1="195" y1="120" x2="205" y2="120"></line>
                    
                    <!-- Solar panels on deck -->
                    <rect x="120" y="125" width="60" height="8" stroke-dasharray="1,1"></rect>
                    <rect x="220" y="125" width="60" height="8" stroke-dasharray="1,1"></rect>
                    
                    <!-- Sensor pod -->
                    <rect x="190" y="128" width="20" height="6"></rect>
                    
                    <!-- Component areas -->
                    <rect x="130" y="126" width="25" height="8" stroke-dasharray="2,2"></rect>
                    <rect x="245" y="126" width="25" height="8" stroke-dasharray="2,2"></rect>
                    
                    <!-- Antenna -->
                    <line x1="290" y1="123" x2="290" y2="110"></line>
                    <circle cx="290" cy="110" r="2"></circle>
                    
                    <!-- Weather sensors on sail -->
                    <circle cx="212" cy="50" r="3"></circle>
                    <line x1="212" y1="50" x2="225" y2="50"></line>
                </g>
              </g>
</svg>