<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <desc>Caliburn Naval Vessel Technical Diagrams Collection</desc>
  <rect width="1200" height="720" fill="#0a0f18"/>
  <g transform="translate(0, 0)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Main hull outline -->
                    <path d="M 25 120
                             L 35 110
                             L 45 105
                             L 60 102
                             L 340 102
                             L 355 105
                             L 365 110
                             L 375 120
                             L 370 130
                             L 360 135
                             L 345 137
                             L 65 137
                             L 50 135
                             L 35 130
                             L 25 120 Z"></path>
                    
                    <!-- Superstructure - Forward -->
                    <rect x="120" y="82" width="50" height="20"></rect>
                    <rect x="125" y="70" width="40" height="12"></rect>
                    
                    <!-- Main superstructure with SPY-1 arrays -->
                    <rect x="180" y="65" width="70" height="37"></rect>
                    <rect x="185" y="50" width="60" height="15"></rect>
                    <!-- SPY-1 radar faces -->
                    <rect x="180" y="70" width="8" height="25" fill="#cbfd00" opacity="0.1"></rect>
                    <rect x="242" y="70" width="8" height="25" fill="#cbfd00" opacity="0.1"></rect>
                    
                    <!-- Aft superstructure -->
                    <rect x="260" y="75" width="40" height="27"></rect>
                    
                    <!-- Masts -->
                    <line x1="150" y1="70" x2="150" y2="40"></line>
                    <line x1="215" y1="50" x2="215" y2="25"></line>
                    <circle cx="215" cy="25" r="4"></circle>
                    <line x1="280" y1="75" x2="280" y2="55"></line>
                    
                    <!-- Forward VLS (32 cells) -->
                    <rect x="75" y="92" width="35" height="10"></rect>
                    <line x1="80" y1="92" x2="80" y2="102"></line>
                    <line x1="85" y1="92" x2="85" y2="102"></line>
                    <line x1="90" y1="92" x2="90" y2="102"></line>
                    <line x1="95" y1="92" x2="95" y2="102"></line>
                    <line x1="100" y1="92" x2="100" y2="102"></line>
                    <line x1="105" y1="92" x2="105" y2="102"></line>
                    
                    <!-- Aft VLS (64 cells) -->
                    <rect x="310" y="92" width="45" height="10"></rect>
                    <line x1="315" y1="92" x2="315" y2="102"></line>
                    <line x1="320" y1="92" x2="320" y2="102"></line>
                    <line x1="325" y1="92" x2="325" y2="102"></line>
                    <line x1="330" y1="92" x2="330" y2="102"></line>
                    <line x1="335" y1="92" x2="335" y2="102"></line>
                    <line x1="340" y1="92" x2="340" y2="102"></line>
                    <line x1="345" y1="92" x2="345" y2="102"></line>
                    <line x1="350" y1="92" x2="350" y2="102"></line>
                    
                    <!-- 5-inch guns -->
                    <circle cx="55" cy="102" r="8"></circle>
                    <rect x="51" y="98" width="8" height="8"></rect>
                    <circle cx="370" cy="102" r="8"></circle>
                    <rect x="366" y="98" width="8" height="8"></rect>
                    
                    <!-- Harpoon canisters -->
                    <rect x="170" y="85" width="8" height="12"></rect>
                    <rect x="252" y="85" width="8" height="12"></rect>
                    
                    <!-- Component mounting areas -->
                    <rect x="90" y="110" width="25" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="130" y="110" width="35" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="190" y="110" width="40" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="265" y="110" width="35" height="20" stroke-dasharray="2,2"></rect>
                    
                    <!-- Helicopter pad -->
                    <rect x="320" y="102" width="40" height="35" stroke-dasharray="2,2"></rect>
                    <circle cx="340" cy="119.5" r="12" stroke-dasharray="1,1"></circle>
                    <text x="340" y="123" text-anchor="middle" font-size="8" fill="#cbfd00" opacity="0.5">H</text>
                    
                    <!-- CIWS mounts -->
                    <circle cx="110" cy="85" r="5"></circle>
                    <circle cx="305" cy="85" r="5"></circle>
                </g>
              </g>
  <g transform="translate(400, 0)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- Trimaran hull - center hull -->
                    <path d="M 40 120
                             L 50 110
                             L 60 105
                             L 80 103
                             L 320 103
                             L 340 105
                             L 350 110
                             L 360 120
                             L 355 130
                             L 345 135
                             L 330 137
                             L 70 137
                             L 55 135
                             L 45 130
                             L 40 120 Z"></path>
                    
                    <!-- Port outrigger -->
                    <path d="M 60 100
                             L 65 95
                             L 280 95
                             L 285 100
                             L 280 105
                             L 65 105
                             L 60 100 Z"></path>
                    
                    <!-- Starboard outrigger -->
                    <path d="M 60 140
                             L 65 135
                             L 280 135
                             L 285 140
                             L 280 145
                             L 65 145
                             L 60 140 Z"></path>
                    
                    <!-- Angular superstructure -->
                    <path d="M 140 103
                             L 140 85
                             L 145 75
                             L 240 75
                             L 245 85
                             L 245 103"></path>
                    <path d="M 150 75
                             L 150 65
                             L 155 60
                             L 230 60
                             L 235 65
                             L 235 75"></path>
                    
                    <!-- Integrated mast -->
                    <path d="M 190 60
                             L 190 40
                             L 195 35
                             L 195 60"></path>
                    <rect x="188" y="35" width="9" height="5"></rect>
                    
                    <!-- 57mm gun -->
                    <circle cx="80" cy="103" r="10"></circle>
                    <rect x="75" y="98" width="10" height="10"></rect>
                    
                    <!-- SeaRAM mount -->
                    <circle cx="120" cy="90" r="8"></circle>
                    <path d="M 112 90 L 128 90 M 120 82 L 120 98"></path>
                    
                    <!-- Mission bay (large modular area) -->
                    <rect x="250" y="108" width="60" height="24" stroke-dasharray="3,2"></rect>
                    <text x="280" y="123" text-anchor="middle" font-size="6" fill="#cbfd00" opacity="0.5">MISSION BAY</text>
                    
                    <!-- Side launch doors -->
                    <rect x="255" y="125" width="8" height="10" stroke-dasharray="1,1"></rect>
                    <rect x="297" y="125" width="8" height="10" stroke-dasharray="1,1"></rect>
                    
                    <!-- Flight deck -->
                    <rect x="310" y="103" width="45" height="34" stroke-dasharray="2,2"></rect>
                    <circle cx="332.5" cy="120" r="13" stroke-dasharray="1,1"></circle>
                    
                    <!-- Waterjet positions -->
                    <circle cx="355" cy="120" r="5" stroke-dasharray="1,1"></circle>
                    <circle cx="355" cy="110" r="3" stroke-dasharray="1,1"></circle>
                    <circle cx="355" cy="130" r="3" stroke-dasharray="1,1"></circle>
                    
                    <!-- Component mounting areas -->
                    <rect x="90" y="112" width="30" height="18" stroke-dasharray="2,2"></rect>
                    <rect x="155" y="112" width="40" height="18" stroke-dasharray="2,2"></rect>
                    <rect x="210" y="112" width="30" height="18" stroke-dasharray="2,2"></rect>
                    
                    <!-- Signature reduction features -->
                    <path d="M 140 85 L 145 75 M 240 75 L 245 85" stroke-width="0.5"></path>
                    <path d="M 150 65 L 155 60 M 230 60 L 235 65" stroke-width="0.5"></path>
                </g>
              </g>
  <g transform="translate(0, 240)">

                <g stroke="#cbfd00" stroke-width="1.5" fill="none" opacity="0.3">
                    <!-- High-speed patrol boat hull -->
                    <path d="M 50 120
                             L 55 110
                             L 65 105
                             L 85 102
                             L 100 100
                             L 300 100
                             L 315 102
                             L 335 105
                             L 345 110
                             L 350 120
                             L 345 128
                             L 335 132
                             L 315 134
                             L 300 136
                             L 100 136
                             L 85 134
                             L 65 132
                             L 55 128
                             L 50 120 Z"></path>
                    
                    <!-- Deep-V hull lines -->
                    <path d="M 65 105 L 70 118 L 65 132" stroke-width="0.5"></path>
                    <path d="M 335 105 L 330 118 L 335 132" stroke-width="0.5"></path>
                    
                    <!-- Pilothouse -->
                    <rect x="140" y="80" width="60" height="20"></rect>
                    <path d="M 140 80 L 145 70 L 195 70 L 200 80"></path>
                    <!-- Windows -->
                    <rect x="145" y="85" width="50" height="8" fill="#cbfd00" opacity="0.1"></rect>
                    
                    <!-- Mast with sensors -->
                    <line x1="170" y1="70" x2="170" y2="45"></line>
                    <circle cx="170" cy="45" r="4"></circle>
                    <line x1="165" y1="55" x2="175" y2="55"></line>
                    <rect x="167" y="60" width="6" height="4"></rect>
                    
                    <!-- Forward weapon mount -->
                    <circle cx="90" cy="100" r="12" stroke-dasharray="2,2"></circle>
                    <text x="90" y="103" text-anchor="middle" font-size="6" fill="#cbfd00" opacity="0.5">RWS</text>
                    
                    <!-- Aft deck equipment area -->
                    <rect x="220" y="102" width="70" height="32" stroke-dasharray="2,2"></rect>
                    <text x="255" y="120" text-anchor="middle" font-size="6" fill="#cbfd00" opacity="0.5">PAYLOAD</text>
                    
                    <!-- Twin outboard configuration -->
                    <rect x="340" y="108" width="18" height="8"></rect>
                    <rect x="340" y="120" width="18" height="8"></rect>
                    <circle cx="358" cy="112" r="4"></circle>
                    <circle cx="358" cy="124" r="4"></circle>
                    <path d="M 350 112 L 340 112 M 350 124 L 340 124"></path>
                    
                    <!-- Side-mounted equipment -->
                    <rect x="75" y="115" width="8" height="15"></rect>
                    <rect x="317" y="115" width="8" height="15"></rect>
                    
                    <!-- Component mounting areas -->
                    <rect x="105" y="108" width="30" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="155" y="108" width="35" height="20" stroke-dasharray="2,2"></rect>
                    <rect x="210" y="108" width="25" height="20" stroke-dasharray="2,2"></rect>
                    
                    <!-- Autonomous systems indicators -->
                    <circle cx="150" cy="90" r="3" fill="#cbfd00" opacity="0.3"></circle>
                    <circle cx="160" cy="90" r="3" fill="#cbfd00" opacity="0.3"></circle>
                    <circle cx="180" cy="90" r="3" fill="#cbfd00" opacity="0.3"></circle>
                    <circle cx="190" cy="90" r="3" fill="#cbfd00" opacity="0.3"></circle>
                    
                    <!-- Hull steps/strakes -->
                    <line x1="100" y1="125" x2="300" y2="125" stroke-width="0.5" stroke-dasharray="8,4"></line>
                    <line x1="100" y1="130" x2="300" y2="130" stroke-width="0.5" stroke-dasharray="8,4"></line>
                    
                    <!-- Navigation lights positions -->
                    <circle cx="55" cy="105" r="2"></circle>
                    <circle cx="345" cy="105" r="2"></circle>
                    <circle cx="350" cy="120" r="2"></circle>
                </g>
              </g>
</svg>